<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Upload, view, and analyze hyperspectral datacubes (.envi, .npz) entirely in your browser. Extract spectral signatures, visualize bands, and export high-res graphs. Free and no installation required." />
    <meta name="keywords" content="hyperspectral, datacube, envi format, npz, spectral signature, remote sensing, image analysis, web viewer, open source" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hsi-studio.vercel.app/" />
    <meta property="og:title" content="HSI Studio | Free Online Hyperspectral Image Viewer" />
    <meta property="og:description" content="Upload, view, and analyze hyperspectral datacubes entirely in your browser. No installation required." />
    <meta property="og:image" content="https://hsi-studio.vercel.app/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://hsi-studio.vercel.app/" />
    <meta property="twitter:title" content="HSI Studio | Free Online Hyperspectral Image Viewer" />
    <meta property="twitter:description" content="Upload, view, and analyze hyperspectral datacubes entirely in your browser. No installation required." />
    <meta property="twitter:image" content="https://hsi-studio.vercel.app/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <title>HSI Studio | Free Online Hyperspectral Image Viewer & Datacube Analyzer</title>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "HSI Studio",
      "operatingSystem": "Web Browser",
      "applicationCategory": "BrowserApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "A free, web-based tool to upload, view, and analyze hyperspectral datacubes. Supports ENVI and NPZ formats, spectral signature extraction, and high-res graph exports.",
      "featureList": [
        "ENVI datacube support",
        "NPZ datacube support",
        "Interactive spectral plotting",
        "Free and open-source",
        "No installation required"
      ]
    }
    </script>
  </head>
  <style>
    body {
      margin: 0;
      background: #0f1115; /* HSI Studio dark theme background */
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    #initial-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      background: #0f1115;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.1);
      border-left-color: #3b82f6; /* Accent blue */
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 24px;
    }
    .loading-text {
      font-size: 14px;
      font-weight: 500;
      color: #94a3b8; /* text-tertiary */
      letter-spacing: 0.05em;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  <body>
    <div id="root">
      <!-- Static loader that renders instantly before React bundle downloads -->
      <div id="initial-loader">
        <div class="spinner"></div>
        <div class="loading-text">Loading HSI Studio...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
